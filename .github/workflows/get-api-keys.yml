name: Get API Keys

on:
  workflow_dispatch:

jobs:
  get-keys:
    runs-on: ubuntu-latest
    steps:
      - name: Install supabase CLI
        run: |
          curl -sSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/

      - name: Extract keys
        run: |
          python3 -c "
          import base64, json, sys

          # Decode the service key JWT to understand the project
          sk = '${{ secrets.SUPABASE_SERVICE_KEY }}'
          url = '${{ secrets.SUPABASE_URL }}'
          
          # Split JWT and decode payload (no verification needed)
          parts = sk.split('.')
          payload = parts[1]
          # Add padding
          payload += '=' * (4 - len(payload) % 4)
          decoded = json.loads(base64.urlsafe_b64decode(payload))
          print('JWT payload:', json.dumps(decoded, indent=2))
          print('Project ref:', decoded.get('ref', 'unknown'))
          print('Role:', decoded.get('role', 'unknown'))
          print('Issuer:', decoded.get('iss', 'unknown'))
          "

      - name: Write key to artifact
        run: |
          mkdir -p /tmp/keys
          echo '${{ secrets.SUPABASE_SERVICE_KEY }}' > /tmp/keys/service_key.txt
          echo '${{ secrets.SUPABASE_URL }}' > /tmp/keys/url.txt

      - name: Upload keys artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-keys
          path: /tmp/keys/
          retention-days: 1
