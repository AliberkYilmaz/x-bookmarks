name: Sync X Bookmarks

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Who triggered this sync'
        required: false
        default: 'manual'
        type: string

jobs:
  sync:
    name: Sync Bookmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # NOTE: twitter-cli requires browser cookie-based auth (auth_token + ct0).
      # The repo currently has X_USERNAME and X_PASSWORD secrets, but these
      # cannot be used directly — twitter-cli does not support username/password login.
      # To fix: log into X in a browser, extract auth_token and ct0 cookies,
      # then add them as TWITTER_AUTH_TOKEN and TWITTER_CT0 repo secrets.
      - name: Run sync
        id: sync
        run: python scripts/sync.py
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Sync completed successfully."
          else
            echo "❌ Sync failed. Check logs above."
          fi